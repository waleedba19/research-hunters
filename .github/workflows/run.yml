name: 🔬 Research Hunter — 24/7 Cloud Search

on:
  workflow_dispatch:
    inputs:
      # ── STEP 1: Research Title ────────────────────────────────────────────
      title:
        description: '📌 Research topic / title (required)'
        required: true
        default: ''
      
      # ── STEP 2: Research Questions ────────────────────────────────────────
      rq1:
        description: '📝 Research Question 1 (optional)'
        required: false
        default: ''
      rq2:
        description: '📝 Research Question 2 (optional)'
        required: false
        default: ''
      rq3:
        description: '📝 Research Question 3 (optional)'
        required: false
        default: ''
      rq4:
        description: '📝 Research Question 4 (optional)'
        required: false
        default: ''
      rq5:
        description: '📝 Research Question 5 (optional)'
        required: false
        default: ''
      
      # ── STEP 5: Field Selection ──────────────────────────────────────────────
      field:
        description: '🎓 Academic field'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto - Auto-detect from title
          - '1 - Applied Linguistics'
          - '2 - Second Language Acquisition'
          - '3 - TESOL / EFL / ESL'
          - '4 - Discourse Analysis'
          - '5 - Sociolinguistics'
          - '6 - Psycholinguistics'
          - '7 - Translation Studies'
          - '8 - Language Teaching Methods'
          - '9 - Computational Linguistics'
          - '10 - Historical Linguistics'
          - '11 - Educational Technology'
          - '12 - General Education'
          - '13 - Curriculum and Instruction'
          - '14 - Educational Psychology'
          - '15 - Higher Education'
          - '16 - Special Education'
          - '17 - Psychology'
          - '18 - Sociology'
          - '19 - Anthropology'
          - '20 - Political Science'
          - '21 - Communication Studies'
          - '22 - Cultural Studies'
          - '23 - Gender Studies'
          - '24 - History'
          - '25 - Computer Science / AI'
          - '26 - Data Science / ML'
          - '27 - Medicine / Health Sciences'
          - '28 - Nursing'
          - '29 - Pharmacology'
          - '30 - Biology / Life Sciences'
          - '31 - Chemistry'
          - '32 - Physics'
          - '33 - Mathematics'
          - '34 - Environmental Science'
          - '35 - Engineering'
          - '36 - Materials Science'
          - '37 - Agricultural Sciences'
          - '38 - Business / Economics'
          - '39 - Marketing'
          - '40 - Finance / Accounting'
          - '41 - Management'
          - '42 - Law / Legal Studies'
          - '43 - Public Policy'
          - '44 - Philosophy'
          - '45 - Literature'
          - '46 - Linguistics (General)'
          - '47 - Arts / Music / Design'
          - '48 - Theology / Religious Studies'

      # ── STEP 6: Study Type Selection ────────────────────────────────────────
      study_type:
        description: '📋 Study type'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto - Auto-detect from title
          - '1 - Empirical Research'
          - '2 - Systematic Review / Meta-Analysis'
          - '3 - Literature Review'
          - '4 - Case Study'
          - '5 - Experimental Study'
          - '6 - Qualitative Study'
          - '7 - Quantitative Study'
          - '8 - Mixed-Methods'
          - '9 - Theoretical Framework'
          - '10 - Thesis / Dissertation'
          - '11 - Conference Paper'
          - '12 - Book Chapter'
          - '14 - PhD Dissertation'
          - '15 - Master Thesis'
          - '16 - Action Research'
          - '17 - Survey Research'
          - '18 - Grounded Theory'
          - '19 - Ethnographic Study'
          - '20 - Phenomenological Study'
          - '21 - Narrative Inquiry'
          - '22 - Longitudinal Study'
          - '23 - Cross-Sectional Study'
          - '24 - Randomized Controlled Trial'
          - '25 - Cohort Study'
          - '26 - Scoping Review'
          - '27 - Critical Review'
          - '28 - Technical Report'
          - '29 - White Paper'
          - '30 - Any / All types'
      
      # ── STEP 7: Language ──────────────────────────────────────────────────
      language:
        description: '🌍 Language (1=EN, 2=AR, 3=FR, 4=ES, 5=EN+AR, 6=EN+FR, 7=EN+AR+FR, 8=All)'
        required: true
        default: '1'
      
      # ── STEP 8: Year Range ────────────────────────────────────────────────
      year_from:
        description: '📅 Year from (e.g. 2015, leave blank = all years)'
        required: false
        default: ''
      year_to:
        description: '📅 Year to (default = current year)'
        required: false
        default: ''
      
      # ── STEP 9: Search Mode ───────────────────────────────────────────────
      mode:
        description: '🔎 Search mode (quick=8APIs, field=best, deep=70+ platforms)'
        required: true
        default: 'deep'
        type: choice
        options:
          - quick
          - field
          - deep
      
      # ── STEP 10a: Sci-Hub ─────────────────────────────────────────────────
      scihub:
        description: '⚡ Enable Sci-Hub / shadow libraries?'
        required: true
        default: false
        type: boolean
      
      # ── STEP 10b: Folder Mode ─────────────────────────────────────────────
      folder_mode:
        description: '📁 Output folder mode (hierarchy=16 folders, single=one folder)'
        required: true
        default: 'hierarchy'
        type: choice
        options:
          - hierarchy
          - single
      
      # ── STEP 4: Keywords ──────────────────────────────────────────────────
      keywords:
        description: '🔑 Custom keywords (comma-separated, or leave blank for auto-extraction)'
        required: false
        default: ''
      
      # ── STEP 11: Proxy ────────────────────────────────────────────────────
      proxy:
        description: '🌐 Proxy (y=auto qoder, p=custom URL, n=skip)'
        required: true
        default: 'n'
        type: choice
        options:
          - n
          - y
          - p

      # ── Notification Email ────────────────────────────────────────────────
      email:
        description: '📧 Email for completion notification (optional)'
        required: false
        default: ''

  schedule:
    - cron: '0 0 * * 0'

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max (GitHub max for free)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup Node.js (for DOCX reports)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests rich openpyxl
          npm install docx

      - name: Build command arguments
        id: args
        shell: bash
        run: |
          ARGS="--title \"${{ github.event.inputs.title }}\""
          
          # Research Questions
          if [ -n "${{ github.event.inputs.rq1 }}" ]; then ARGS="$ARGS --rq1 \"${{ github.event.inputs.rq1 }}\""; fi
          if [ -n "${{ github.event.inputs.rq2 }}" ]; then ARGS="$ARGS --rq2 \"${{ github.event.inputs.rq2 }}\""; fi
          if [ -n "${{ github.event.inputs.rq3 }}" ]; then ARGS="$ARGS --rq3 \"${{ github.event.inputs.rq3 }}\""; fi
          if [ -n "${{ github.event.inputs.rq4 }}" ]; then ARGS="$ARGS --rq4 \"${{ github.event.inputs.rq4 }}\""; fi
          if [ -n "${{ github.event.inputs.rq5 }}" ]; then ARGS="$ARGS --rq5 \"${{ github.event.inputs.rq5 }}\""; fi
          
          # Field (extract number from "1 - Applied Linguistics" or "auto" format)
          FIELD_VAL="${{ github.event.inputs.field }}"
          FIELD_NUM=$(echo "$FIELD_VAL" | cut -d' ' -f1)
          if [ "$FIELD_NUM" != "auto" ] && [ -n "$FIELD_NUM" ]; then
            ARGS="$ARGS --field \"$FIELD_NUM\""
          fi
          
          # Study Type (extract number from "6 - Qualitative Study" or "auto" format)
          ST_VAL="${{ github.event.inputs.study_type }}"
          ST_NUM=$(echo "$ST_VAL" | cut -d' ' -f1)
          if [ "$ST_NUM" != "auto" ] && [ -n "$ST_NUM" ]; then
            ARGS="$ARGS --study-type \"$ST_NUM\""
          fi
          
          # Language
          ARGS="$ARGS --language ${{ github.event.inputs.language }}"
          
          # Year range
          if [ -n "${{ github.event.inputs.year_from }}" ]; then ARGS="$ARGS --year-from ${{ github.event.inputs.year_from }}"; fi
          if [ -n "${{ github.event.inputs.year_to }}" ]; then ARGS="$ARGS --year-to ${{ github.event.inputs.year_to }}"; fi
          
          # Mode
          MODE="${{ github.event.inputs.mode }}"
          MODE="${MODE%% *}"  # Take first word (quick/field/deep)
          ARGS="$ARGS --mode $MODE"
          
          # Sci-Hub
          if [ "${{ github.event.inputs.scihub }}" == "true" ]; then
            ARGS="$ARGS --scihub"
          fi
          
          # Folder mode
          if [ "${{ github.event.inputs.folder_mode }}" == "single" ]; then
            ARGS="$ARGS --single-folder"
          fi
          
          # Custom keywords
          if [ -n "${{ github.event.inputs.keywords }}" ]; then
            ARGS="$ARGS --keywords \"${{ github.event.inputs.keywords }}\""
          fi
          
          # Proxy
          if [ "${{ github.event.inputs.proxy }}" == "y" ] || [ "${{ github.event.inputs.proxy }}" == "p" ]; then
            ARGS="$ARGS --proxy ${{ github.event.inputs.proxy }}"
          fi
          
          echo "args=$ARGS" >> $GITHUB_OUTPUT

      - name: Run Research Hunter (Full Wizard Mode)
        env:
          PYTHONIOENCODING: utf-8
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  🔬 Research Hunter v6 — SUPER LOADED GOD MODE             ║"
          echo "║  Running on GitHub Actions Cloud (24/7)                    ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📋 Search Parameters:"
          python research_hunter_v2-4.py ${{ steps.args.outputs.args }}

      - name: Check results
        id: check_results
        shell: bash
        run: |
          echo "=== Results Summary ==="
          echo "Title: ${{ github.event.inputs.title }}"
          echo "Mode: ${{ github.event.inputs.mode }}"
          
          # Count results
          PDF_COUNT=$(find pdf_files/ -name "*.pdf" 2>/dev/null | wc -l)
          JSON_COUNT=$(find pdf_files/ -name "results.json" 2>/dev/null | wc -l)
          MD_COUNT=$(find pdf_files/ -name "research_report.md" 2>/dev/null | wc -l)
          CSV_COUNT=$(find pdf_files/ -name "master_database.csv" -o -name "master_database.xlsx" 2>/dev/null | wc -l)
          REDLIST_COUNT=$(find pdf_files/ -name "RED_LIST_view.html" 2>/dev/null | wc -l)
          
          echo "PDFs downloaded: $PDF_COUNT"
          echo "Results JSON: $JSON_COUNT"
          echo "Reports: $MD_COUNT MD, $CSV_COUNT database, $REDLIST_COUNT redlist"
          
          echo "pdf_count=$PDF_COUNT" >> $GITHUB_OUTPUT
          
          if [ "$PDF_COUNT" -gt 0 ] || [ "$JSON_COUNT" -gt 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=no_results" >> $GITHUB_OUTPUT
          fi

      - name: Zip all results (16-folder hierarchy preserved)
        if: always()
        shell: bash
        run: |
          echo "📦 Creating ZIP archive..."
          if [ -d "pdf_files" ] && [ "$(find pdf_files/ -type f 2>/dev/null | wc -l)" -gt 0 ]; then
            # Install zip if needed
            sudo apt-get update -qq && sudo apt-get install -y -qq zip unzip
            
            # Create timestamped zip with full folder structure
            TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
            SAFE_TITLE=$(echo "${{ github.event.inputs.title }}" | sed 's/[^a-zA-Z0-9_\-]/_/g' | cut -c1-40)
            ZIP_NAME="research_${SAFE_TITLE}_${TIMESTAMP}.zip"
            
            cd pdf_files
            zip -r -9 "../${ZIP_NAME}" ./
            cd ..
            
            echo "✅ ZIP created: ${ZIP_NAME}"
            ls -lh "${ZIP_NAME}"
            echo "zip_name=${ZIP_NAME}" >> $GITHUB_OUTPUT
          else
            echo "⚠ No results to zip"
            echo "zip_name=" >> $GITHUB_OUTPUT
          fi

      - name: Upload full results (ZIP + individual files)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-hunt-results
          path: |
            pdf_files/
            *.zip
          retention-days: 90
          compression-level: 9

      - name: Upload cache/logs (for resume capability)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cache-data
          path: |
            search_cache.json
            ghost_credentials.json
            g4f_locked_config.json
          retention-days: 30

      # ── Email notification ────────────────────────────────────────────────
      - name: Send email notification
        if: always() && github.event.inputs.email != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: >-
            ${{ job.status == 'success' && '✅' || '❌' }}
            Research Hunt Complete: ${{ github.event.inputs.title }}
          to: ${{ github.event.inputs.email }}
          from: Research Hunter Bot
          body: |
            🔬 Research Hunter v6 — SUPER LOADED GOD MODE
            
            ───────────────────────────────────────
            📋 SEARCH COMPLETED
            ───────────────────────────────────────
            
            Status: ${{ job.status }}
            Title: ${{ github.event.inputs.title }}
            
            📊 Results Summary:
            • PDFs Downloaded: ${{ steps.check_results.outputs.pdf_count || '0' }}
            • Topic: ${{ github.event.inputs.title }}
            • Search Mode: ${{ github.event.inputs.mode }}
            
            📂 Your results are available as ZIP download:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            ───────────────────────────────────────
            Generated by Research Hunter v6 on GitHub Actions
            🔗 ${{ github.server_url }}/${{ github.repository }}

      # ── Alternative: Send via curl (no SMTP setup needed) ─────────────────
      - name: Send notification via Pushover / email fallback
        if: always() && github.event.inputs.email != ''
        shell: bash
        run: |
          echo "📧 To get email notifications, set these GitHub Secrets:"
          echo "   - MAIL_USERNAME (your Gmail address)"
          echo "   - MAIL_PASSWORD (Google App Password)"
          echo ""
          echo "📎 Or configure in Settings → Secrets and variables → Actions"
          echo ""
          echo "Download your results from:"
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"