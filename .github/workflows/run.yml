name: Research Hunter 24/7 Cloud Search
permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      title:
        description: '📌 Research topic / title (required)'
        required: true
        default: ''
      rq1:
        description: '📝 Research Question 1 (optional)'
        required: false
        default: ''
      rq2:
        description: '📝 Research Question 2 (optional)'
        required: false
        default: ''
      rq3:
        description: '📝 Research Question 3 (optional)'
        required: false
        default: ''
      rq4:
        description: '📝 Research Question 4 (optional)'
        required: false
        default: ''
      rq5:
        description: '📝 Research Question 5 (optional)'
        required: false
        default: ''
      field:
        description: '🎓 Academic field'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto - Auto-detect from title
          - '1 - Applied Linguistics'
          - '2 - Second Language Acquisition'
          - '3 - TESOL / EFL / ESL'
          - '4 - Discourse Analysis'
          - '5 - Sociolinguistics'
          - '6 - Psycholinguistics'
          - '7 - Translation Studies'
          - '8 - Language Teaching Methods'
          - '9 - Computational Linguistics'
          - '10 - Historical Linguistics'
          - '11 - Educational Technology'
          - '12 - General Education'
          - '13 - Curriculum and Instruction'
          - '14 - Educational Psychology'
          - '15 - Higher Education'
          - '16 - Special Education'
          - '17 - Psychology'
          - '18 - Sociology'
          - '19 - Anthropology'
          - '20 - Political Science'
          - '21 - Communication Studies'
          - '22 - Cultural Studies'
          - '23 - Gender Studies'
          - '24 - History'
          - '25 - Computer Science / AI'
          - '26 - Data Science / ML'
          - '27 - Medicine / Health Sciences'
          - '28 - Nursing'
          - '29 - Pharmacology'
          - '30 - Biology / Life Sciences'
          - '31 - Chemistry'
          - '32 - Physics'
          - '33 - Mathematics'
          - '34 - Environmental Science'
          - '35 - Engineering'
          - '36 - Materials Science'
          - '37 - Agricultural Sciences'
          - '38 - Business / Economics'
          - '39 - Marketing'
          - '40 - Finance / Accounting'
          - '41 - Management'
          - '42 - Law / Legal Studies'
          - '43 - Public Policy'
          - '44 - Philosophy'
          - '45 - Literature'
          - '46 - Linguistics (General)'
          - '47 - Arts / Music / Design'
          - '48 - Theology / Religious Studies'
      study_type:
        description: '📋 Study type'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto - Auto-detect from title
          - '1 - Empirical Research'
          - '2 - Systematic Review / Meta-Analysis'
          - '3 - Literature Review'
          - '4 - Case Study'
          - '5 - Experimental Study'
          - '6 - Qualitative Study'
          - '7 - Quantitative Study'
          - '8 - Mixed-Methods'
          - '9 - Theoretical Framework'
          - '10 - Thesis / Dissertation'
          - '11 - Conference Paper'
          - '12 - Book Chapter'
          - '14 - PhD Dissertation'
          - '15 - Master Thesis'
          - '16 - Action Research'
          - '17 - Survey Research'
          - '18 - Grounded Theory'
          - '19 - Ethnographic Study'
          - '20 - Phenomenological Study'
          - '21 - Narrative Inquiry'
          - '22 - Longitudinal Study'
          - '23 - Cross-Sectional Study'
          - '24 - Randomized Controlled Trial'
          - '25 - Cohort Study'
          - '26 - Scoping Review'
          - '27 - Critical Review'
          - '28 - Technical Report'
          - '29 - White Paper'
          - '30 - Any / All types'
      language:
        description: '🌍 Language (1=EN, 2=AR, 3=FR, 4=ES, 5=EN+AR, 6=EN+FR, 7=EN+AR+FR, 8=All)'
        required: true
        default: '1'
      year_from:
        description: '📅 Year from (e.g. 2015, leave blank = all years)'
        required: false
        default: ''
      year_to:
        description: '📅 Year to (default = current year)'
        required: false
        default: ''
      mode:
        description: '🔎 Search mode — sample=~5min test (4 platforms, ~200 papers), quick=~30min (8 platforms, ~1000), field=~2hr (28 platforms, ~3000), deep=4-8hr+ (all 70+ platforms)'
        required: true
        default: 'sample'
        type: choice
        options:
          - sample
          - quick
          - field
          - deep
      max_batches:
        description: '⏱ Max batches per run (each batch=50 papers; 12 batches≈600 papers≈6 hours; 0=all)'
        required: false
        default: '12'
      scihub:
        description: '⚡ Enable Sci-Hub / shadow libraries?'
        required: true
        default: false
        type: boolean
      folder_mode:
        description: '📁 Output folder mode (hierarchy=16 folders, single=one folder)'
        required: true
        default: 'hierarchy'
        type: choice
        options:
          - hierarchy
          - single
      keywords:
        description: '🔑 Custom keywords (comma-separated, or leave blank for auto-extraction)'
        required: false
        default: ''
      proxy:
        description: '🌐 Proxy (y=auto qoder, p=custom URL, n=skip)'
        required: true
        default: 'n'
        type: choice
        options:
          - n
          - y
          - p
      email:
        description: '📧 Email for completion notification (optional)'
        required: false
        default: ''

  schedule:
    - cron: '0 0 * * 0'

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    outputs:
      total_pdfs:
        description: 'Total PDFs across all runs'
        value: ${{ steps.check_results.outputs.pdf_count }}
      zip_name:
        description: 'Final ZIP archive name'
        value: ${{ steps.check_results.outputs.zip_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup Node.js (for DOCX reports)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests rich openpyxl
          npm install docx

      - name: Determine output folder (deterministic name from title)
        id: folder
        shell: bash
        run: |
          TITLE="${{ github.event.inputs.title }}"
          SAFE=$(echo "$TITLE" | sed 's/[^a-zA-Z0-9_\-]/_/g' | sed 's/__*/_/g' | cut -c1-50)
          echo "folder_name=RESEARCH_${SAFE}" >> $GITHUB_OUTPUT
          echo "Using folder: RESEARCH_${SAFE}"

      - name: Download previous research data (cumulative)
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: research-data-${{ steps.folder.outputs.folder_name }}
          path: pdf_files_restore

      - name: Download previous cache (resume support)
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: cache-data
        path: download_cache

      - name: Restore cumulative data and cache
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p pdf_files
          echo "📂 Restoring previous data and cache..."
          # Restore the full pdf_files folder from previous run(s)
          if [ -d "pdf_files_restore" ]; then
            echo "Found previous research data"
            cp -r pdf_files_restore/. pdf_files/
            rm -rf pdf_files_restore
          else
            echo "No previous research data found — starting fresh"
          fi
          # Restore cache files
          if [ -d "download_cache" ]; then
            cp -f download_cache/*.json . 2>/dev/null || true
            if [ -d "download_cache/pdf_files" ]; then
              cp -rn download_cache/pdf_files/. pdf_files/ 2>/dev/null || true
            fi
            rm -rf download_cache
          fi
          echo "✅ All data restored"
          ls -la pdf_files/ 2>/dev/null | head -20

      - name: Build command arguments
        id: args
        shell: bash
        run: |
          BASE_DIR="pdf_files/${{ steps.folder.outputs.folder_name }}"
          ARGS="--title \"${{ github.event.inputs.title }}\" --single-folder"
          mkdir -p "$BASE_DIR"
          if [ -n "${{ github.event.inputs.rq1 }}" ]; then ARGS="$ARGS --rq1 \"${{ github.event.inputs.rq1 }}\""; fi
          if [ -n "${{ github.event.inputs.rq2 }}" ]; then ARGS="$ARGS --rq2 \"${{ github.event.inputs.rq2 }}\""; fi
          if [ -n "${{ github.event.inputs.rq3 }}" ]; then ARGS="$ARGS --rq3 \"${{ github.event.inputs.rq3 }}\""; fi
          if [ -n "${{ github.event.inputs.rq4 }}" ]; then ARGS="$ARGS --rq4 \"${{ github.event.inputs.rq4 }}\""; fi
          if [ -n "${{ github.event.inputs.rq5 }}" ]; then ARGS="$ARGS --rq5 \"${{ github.event.inputs.rq5 }}\""; fi
          FIELD_VAL="${{ github.event.inputs.field }}"
          FIELD_NUM=$(echo "$FIELD_VAL" | cut -d' ' -f1)
          if [ "$FIELD_NUM" != "auto" ] && [ -n "$FIELD_NUM" ]; then ARGS="$ARGS --field \"$FIELD_NUM\""; fi
          ST_VAL="${{ github.event.inputs.study_type }}"
          ST_NUM=$(echo "$ST_VAL" | cut -d' ' -f1)
          if [ "$ST_NUM" != "auto" ] && [ -n "$ST_NUM" ]; then ARGS="$ARGS --study-type \"$ST_NUM\""; fi
          ARGS="$ARGS --language ${{ github.event.inputs.language }}"
          if [ -n "${{ github.event.inputs.year_from }}" ]; then ARGS="$ARGS --year-from ${{ github.event.inputs.year_from }}"; fi
          if [ -n "${{ github.event.inputs.year_to }}" ]; then ARGS="$ARGS --year-to ${{ github.event.inputs.year_to }}"; fi
          MODE="${{ github.event.inputs.mode }}"
          MODE="${MODE%% *}"
          ARGS="$ARGS --mode $MODE"
          if [ "${{ github.event.inputs.scihub }}" == "true" ]; then ARGS="$ARGS --scihub"; fi
          if [ -n "${{ github.event.inputs.keywords }}" ]; then ARGS="$ARGS --keywords \"${{ github.event.inputs.keywords }}\""; fi
          if [ "${{ github.event.inputs.proxy }}" == "y" ] || [ "${{ github.event.inputs.proxy }}" == "p" ]; then ARGS="$ARGS --proxy ${{ github.event.inputs.proxy }}"; fi
          echo "args=$ARGS" >> $GITHUB_OUTPUT

      - name: Run Research Hunter (cumulative mode)
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
          PYTHONIOENCODING: utf-8
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  🔬 Research Hunter v6 — CUMULATIVE MODE                   ║"
          echo "║  All runs accumulate into one folder & ZIP                 ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📋 Search Parameters:"
          echo ""
          python research_hunter_v2-4.py ${{ steps.args.outputs.args }}

      - name: Check results
        id: check_results
        shell: bash
        run: |
          echo "=== Results Summary ==="
          OUT_DIR="pdf_files/${{ steps.folder.outputs.folder_name }}"
          PDF_COUNT=$(find "$OUT_DIR" -name "*.pdf" 2>/dev/null | wc -l)
          JSON_COUNT=$(find "$OUT_DIR" -name "results.json" 2>/dev/null | wc -l)
          echo "PDFs in cumulative folder: $PDF_COUNT"
          echo "Results JSON: $JSON_COUNT"
          echo "pdf_count=$PDF_COUNT" >> $GITHUB_OUTPUT
          if [ "$PDF_COUNT" -gt 0 ] || [ "$JSON_COUNT" -gt 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=no_results" >> $GITHUB_OUTPUT
          fi

      - name: Zip cumulative results
        if: always()
        shell: bash
        run: |
          OUT_DIR="pdf_files/${{ steps.folder.outputs.folder_name }}"
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          SAFE_TITLE=$(echo "${{ github.event.inputs.title }}" | sed 's/[^a-zA-Z0-9_\-]/_/g' | cut -c1-30)
          ZIP_NAME="${SAFE_TITLE}_cumulative.zip"
          echo "📦 Creating cumulative ZIP: $ZIP_NAME"
          if [ -d "$OUT_DIR" ] && [ "$(find "$OUT_DIR" -type f 2>/dev/null | wc -l)" -gt 0 ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq zip unzip
            zip -r -9 "$ZIP_NAME" "$OUT_DIR"
            echo "✅ ZIP created: $ZIP_NAME ($(du -h "$ZIP_NAME" | cut -f1))"
          else
            echo "⚠ No data to zip yet"
            touch "$ZIP_NAME"
          fi
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Auto-trigger next run (chain continuation)
        if: always() && steps.check_results.outputs.status == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRIGGER_TITLE: ${{ github.event.inputs.title }}
          TRIGGER_RQ1: ${{ github.event.inputs.rq1 }}
          TRIGGER_RQ2: ${{ github.event.inputs.rq2 }}
          TRIGGER_RQ3: ${{ github.event.inputs.rq3 }}
          TRIGGER_RQ4: ${{ github.event.inputs.rq4 }}
          TRIGGER_RQ5: ${{ github.event.inputs.rq5 }}
          TRIGGER_FIELD: ${{ github.event.inputs.field }}
          TRIGGER_STUDY_TYPE: ${{ github.event.inputs.study_type }}
          TRIGGER_LANGUAGE: ${{ github.event.inputs.language }}
          TRIGGER_YEAR_FROM: ${{ github.event.inputs.year_from }}
          TRIGGER_YEAR_TO: ${{ github.event.inputs.year_to }}
          TRIGGER_MODE: ${{ github.event.inputs.mode }}
          TRIGGER_SCI_HUB: ${{ github.event.inputs.scihub }}
          TRIGGER_FOLDER_MODE: ${{ github.event.inputs.folder_mode }}
          TRIGGER_KEYWORDS: ${{ github.event.inputs.keywords }}
          TRIGGER_PROXY: ${{ github.event.inputs.proxy }}
          TRIGGER_EMAIL: ${{ github.event.inputs.email }}
        shell: bash
        run: |
          echo "🔄 Checking if more work remains..."
          
          CACHE_FILE="pdf_files/${{ steps.folder.outputs.folder_name }}/search_cache.json"
          if [ ! -f "$CACHE_FILE" ]; then
            echo "⚠ No cache file found — cannot determine remaining work"
            exit 0
          fi
          
          TOTAL_FOUND=$(python3 -c "import json; d=json.load(open('$CACHE_FILE')); print(len(d.get('papers_found',{})))" 2>/dev/null || echo "0")
          TOTAL_DL=$(python3 -c "import json; d=json.load(open('$CACHE_FILE')); print(len(d.get('papers_downloaded',{})))" 2>/dev/null || echo "0")
          EXHAUSTED=$(python3 -c "import json; d=json.load(open('$CACHE_FILE')); print(str(d.get('queries_exhausted',False)))" 2>/dev/null || echo "False")
          
          echo "📊 Progress: $TOTAL_DL downloaded / $TOTAL_FOUND found / exhausted=$EXHAUSTED"
          
          if [ "$EXHAUSTED" = "True" ] && [ "$TOTAL_FOUND" -le "$TOTAL_DL" ]; then
            echo "✅ All work complete — no need to trigger another run"
            exit 0
          fi
          
          REMAINING=$(( (TOTAL_FOUND - TOTAL_DL + 49) / 50 ))
          echo "📋 Approximately $REMAINING batches remaining"
          
          if [ "$REMAINING" -le 0 ]; then
            echo "✅ All papers downloaded — no need to trigger another run"
            exit 0
          fi
          
          echo "🚀 Triggering next run via GitHub API..."
          
          python3 -c "
import json, os
inputs = {
    'title':       os.environ.get('TRIGGER_TITLE', '${{ github.event.inputs.title }}'),
    'rq1':         os.environ.get('TRIGGER_RQ1', ''),
    'rq2':         os.environ.get('TRIGGER_RQ2', ''),
    'rq3':         os.environ.get('TRIGGER_RQ3', ''),
    'rq4':         os.environ.get('TRIGGER_RQ4', ''),
    'rq5':         os.environ.get('TRIGGER_RQ5', ''),
    'field':       os.environ.get('TRIGGER_FIELD', '${{ github.event.inputs.field }}'),
    'study_type':  os.environ.get('TRIGGER_STUDY_TYPE', '${{ github.event.inputs.study_type }}'),
    'language':    os.environ.get('TRIGGER_LANGUAGE', '${{ github.event.inputs.language }}'),
    'year_from':   os.environ.get('TRIGGER_YEAR_FROM', ''),
    'year_to':     os.environ.get('TRIGGER_YEAR_TO', ''),
    'mode':        os.environ.get('TRIGGER_MODE', 'sample'),
    'scihub':      os.environ.get('TRIGGER_SCI_HUB', '${{ github.event.inputs.scihub }}'),
    'folder_mode': os.environ.get('TRIGGER_FOLDER_MODE', '${{ github.event.inputs.folder_mode }}'),
    'keywords':    os.environ.get('TRIGGER_KEYWORDS', ''),
    'proxy':       os.environ.get('TRIGGER_PROXY', '${{ github.event.inputs.proxy }}'),
    'email':       os.environ.get('TRIGGER_EMAIL', ''),
}
print(json.dumps({'ref': '${{ github.ref_name }}', 'inputs': inputs}))
"
          
          PAYLOAD=$(cat)
          
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/run.yml/dispatches" \
            -d "$PAYLOAD" \
            -w "\nHTTP Status: %{http_code}"
          
          echo ""
          echo "✅ Next run triggered!"
          echo "🔗 https://github.com/${{ github.repository }}/actions"

      - name: Upload cumulative research data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-data-${{ steps.folder.outputs.folder_name }}
          path: pdf_files/
          retention-days: 90
          compression-level: 1

      - name: Upload cumulative ZIP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.folder.outputs.folder_name }}_ZIP
          path: ${{ steps.check_results.outputs.zip_name || '*.zip' }}
          retention-days: 90
          compression-level: 9

      - name: Upload cache/logs (for resume capability)
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: cache-data
          path: |
            pdf_files/*/search_cache.json
            search_cache.json
            ghost_credentials.json
            g4f_locked_config.json
          retention-days: 30

      - name: Send email notification
        if: always() && github.event.inputs.email != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: >-
            ${{ job.status == 'success' && '✅' || '❌' }}
            Research Hunt: ${{ github.event.inputs.title }}
          to: ${{ github.event.inputs.email }}
          from: Research Hunter Bot
          body: |
            🔬 Research Hunter v6 — CUMULATIVE MODE

            ───────────────────────────────────────
            📋 SEARCH COMPLETED
            ───────────────────────────────────────

            Status: ${{ job.status }}
            Title: ${{ github.event.inputs.title }}
            Run #: ${{ github.run_number }}
            
            📊 Results Summary:
            • Total PDFs (cumulative): ${{ steps.check_results.outputs.pdf_count || '0' }}
            • Topic: ${{ github.event.inputs.title }}
            • Search Mode: ${{ github.event.inputs.mode }}
            • Output Folder: ${{ steps.folder.outputs.folder_name }}
            
            📂 Your results ZIP (all runs combined):
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            ⚠ If this is not the final run, more PDFs will be added in subsequent runs.
            Trigger another run to collect more papers.

            ───────────────────────────────────────
            Generated by Research Hunter v6 on GitHub Actions
            🔗 ${{ github.server_url }}/${{ github.repository }}