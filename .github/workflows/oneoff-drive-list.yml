name: OneOff - List Drive Folder

on:
  workflow_dispatch:
    inputs:
      folder_id:
        description: "Drive folder ID to list"
        required: true
        default: "1NjsBcaAb1qtRUl4d7KHNhvfm159ei2C4"

jobs:
  list:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install --no-cache-dir --break-system-packages -r requirements.txt
      - name: Run
        env:
          FOLDER_ID: ${{ inputs.folder_id }}
          GOOGLE_OAUTH_REFRESH: ${{ secrets.GOOGLE_OAUTH_REFRESH }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        run: python3 oneoff_drive_list.py
