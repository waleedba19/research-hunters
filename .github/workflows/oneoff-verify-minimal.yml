name: OneOff - Verify New Problems (Minimal)

on:
  workflow_dispatch:
    inputs:
      folder_id:
        description: "Drive folder ID containing 'New problems' subfolder"
        required: true
        default: "1NjsBcaAb1qtRUl4d7KHNhvfm159ei2C4"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Run verification
        env:
          FOLDER_ID: ${{ inputs.folder_id }}
          GOOGLE_OAUTH_REFRESH: ${{ secrets.GOOGLE_OAUTH_REFRESH }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        run: python3 verify_new_problems.py

      - name: Upload parsed refs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parsed-refs
          path: /tmp/parsed_refs.json

      - name: Upload verified refs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verified-refs
          path: /tmp/verified_refs.json
