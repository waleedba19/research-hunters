name: OneOff - Minimal Verify (1 ref, 1 platform)

on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/wo312092-creator/runner-base:latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install Python deps
        run: pip install --no-cache-dir --break-system-packages -r requirements.txt
      - name: Run
        run: python3 minimal_verify.py
