name: CI

# Fast, deterministic checks that run automatically on every PR and push.
# No ollama and no network-dependent smoke tests (those live in test.yml,
# which is workflow_dispatch). Everything here must pass offline.

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --no-cache-dir -r requirements.txt

      - name: Syntax check all .py files (warnings are errors)
        run: python3 -W error::SyntaxWarning -m compileall -q .

      - name: Import smoke test
        run: |
          python3 -c "import logger, error_handler, state_manager, scoring_prompts, pdf_parser, metadata_extractor, platform_registry, precision_engine, hunt_pipeline, verify_refs, verify_refs.orchestrator, verify_refs.reports, verify_refs.input_parser" && echo "ALL IMPORTS OK"

      - name: "Unit test: state_manager"
        run: |
          python3 -c "
          from state_manager import save_chapter_state, load_chapter_state, clear_chapter_state
          save_chapter_state(99999, {'foo': 'bar'})
          s = load_chapter_state(99999)
          assert s and s.get('foo') == 'bar', s
          clear_chapter_state(99999)
          assert load_chapter_state(99999) is None
          print('state_manager OK')
          "

      - name: "Unit test: wizard (removed - Excel-focused system)"
        run: echo "Wizard test skipped - Telegram bot integration removed"

      - name: "Unit test: pdf_parser"
        run: |
          python3 -c "
          from pdf_parser import parse_chapter_references, extract_text
          txt = 'Some text (Smith, 2020, p. 12) about stuff. More (Jones et al., 2021).\n\nReferences\n\n1. Smith, J. (2020). Deep learning. Journal of AI, 5(2), 1-10.\n2. Jones, A. et al. (2021). Neural networks. Nature, 100, 200-210.\n'
          import tempfile, os
          f = tempfile.NamedTemporaryFile(suffix='.txt', delete=False, mode='w')
          f.write(txt); f.close()
          r = parse_chapter_references(f.name)
          assert len(r['in_text_citations']) >= 1, r
          assert len(r['reference_list']) >= 1, r
          os.unlink(f.name)
          print('pdf_parser OK')
          "

      - name: "Unit test: verify_refs (parser + reports, no e2e)"
        run: python3 tests/test_verify_refs.py --no-e2e

      - name: "Unit test: hunt_intake (state machine)"
        run: python3 tests/test_hunt_intake.py

      - name: "E2E test: hunt_intake (button + text + skip flow) - removed"
        run: echo "Hunt intake E2E test skipped - Telegram bot integration removed"

      - name: "Unit test: report_pdf"
        run: python3 tests/test_report_pdf.py

      - name: "Unit test: drive_integration (removed - Excel-focused system)"
        run: echo "Drive integration test skipped - Google Drive integration removed"

      - name: "Unit test: future_studies (mocked ollama)"
        run: python3 tests/test_future_studies.py

      - name: "Unit test: telegram_ui (removed - Excel-focused system)"
        run: echo "Telegram UI test skipped - Telegram bot integration removed"

      - name: "Generate sample reports (fixed dataset, no ollama)"
        run: python3 tests/generate_sample_reports.py

      - name: "Test Excel generation system (v10.0)"
        run: python3 generate_ultimate_excel_v10.py

      - name: "Health check: platforms, helpers, structure, verify_refs"
        run: python3 tests/test_health.py
