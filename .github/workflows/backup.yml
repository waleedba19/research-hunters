name: State Backup

on:
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tar state + logs
        run: |
          mkdir -p data/state data/logs
          tar czf /tmp/lit_state_backup_$(date +%Y%m%d).tar.gz data/state/ data/logs/ 2>/dev/null || echo "nothing to backup"
      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lit-state-backup
          path: /tmp/lit_state_backup_*.tar.gz
          retention-days: 30
