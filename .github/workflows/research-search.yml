name: Research Hunter Search

on:
  workflow_dispatch:
    inputs:
      # Research Topic (Required)
      research_topic:
        description: 'Research Topic / Title (required)'
        required: true
        type: string
      
      # Research Questions (Optional)
      research_question_1:
        description: 'Research Question 1 (optional)'
        required: false
        type: string
        default: ''
      
      research_question_2:
        description: 'Research Question 2 (optional)'
        required: false
        type: string
        default: ''
      
      research_question_3:
        description: 'Research Question 3 (optional)'
        required: false
        type: string
        default: ''
      
      research_question_4:
        description: 'Research Question 4 (optional)'
        required: false
        type: string
        default: ''
      
      research_question_5:
        description: 'Research Question 5 (optional)'
        required: false
        type: string
        default: ''
      
      # Academic Field - Detailed options
      academic_field:
        description: '🎓 Academic Field'
        required: false
        type: choice
        options:
          - 'All Fields (No Filter)'
          - 'Computer Science & AI (AI, ML, Deep Learning, NLP)'
          - 'Medicine & Health (Clinical, Medical Research, Public Health)'
          - 'Engineering (Electrical, Mechanical, Civil, Chemical)'
          - 'Business & Economics (Management, Finance, Marketing)'
          - 'Social Sciences (Sociology, Psychology, Anthropology)'
          - 'Education (Pedagogy, E-Learning, Curriculum)'
          - 'Law & Legal Studies (International Law, Human Rights)'
          - 'Arts & Humanities (History, Literature, Philosophy)'
          - 'Sciences (Physics, Chemistry, Biology, Mathematics)'
          - 'Environmental Science (Climate, Sustainability, Ecology)'
          - 'Agriculture & Food Science (Crops, Soil, Food Security)'
          - 'Economics & Econometrics'
          - 'Political Science & International Relations'
          - 'Communication & Media Studies'
          - 'Mathematics & Statistics'
          - 'Physics & Astronomy'
          - 'Chemistry & Materials Science'
          - 'Biology & Life Sciences'
          - 'Earth Sciences & Geology'
          - 'Energy & Renewable Energy'
          - 'Information Technology & Systems'
          - 'Cybersecurity & Cryptography'
          - 'Data Science & Big Data'
          - 'Robotics & Automation'
          - 'Telecommunications & Networking'
          - 'Aerospace & Aviation'
          - 'Biotechnology & Bioinformatics'
          - 'Pharmaceutical Sciences & Drug Development'
          - 'Nursing & Healthcare Management'
          - 'Dentistry & Oral Health'
          - 'Veterinary Sciences'
          - 'Architecture & Urban Planning'
          - 'Transportation & Logistics'
          - 'Manufacturing & Industrial Engineering'
          - 'Nanotechnology & Materials'
        default: 'All Fields (No Filter)'
      
      # Study Type - Detailed options
      study_type:
        description: '📄 Study / Publication Type'
        required: false
        type: choice
        options:
          - 'Any Type (All Publications)'
          - 'Journal Articles (Peer-Reviewed Research Papers)'
          - 'Conference Papers (Conference Proceedings)'
          - 'Theses & Dissertations (Master/PhD Thesis)'
          - 'Books & Book Chapters'
          - 'Preprints (arXiv, bioRxiv, etc.)'
          - 'Systematic Reviews & Meta-Analyses'
          - 'Clinical Trials & Case Studies'
          - 'Technical Reports & White Papers'
          - 'Government Documents & Policy Papers'
          - 'Working Papers & Discussion Papers'
          - 'Patents & Intellectual Property'
        default: 'Any Type (All Publications)'
      
      # Language Selection - Detailed with flags
      language:
        description: '🌐 Search Language(s) (Academic Paper Language)'
        required: true
        type: choice
        options:
          - '1 - English (🇬🇧) - UK, USA, International'
          - '2 - Arabic (🇸🇦) - العربية - Middle East, North Africa'
          - '3 - French (🇫🇷) - Français - France, Africa, Canada'
          - '4 - Spanish (🇪🇸) - Español - Spain, Latin America'
          - '5 - German (🇩🇪) - Deutsch - Germany, Austria, Switzerland'
          - '6 - Chinese (🇨🇳) - 中文 - China, Taiwan, Singapore'
          - '7 - Portuguese (🇵🇹) - Português - Portugal, Brazil'
          - '8 - Persian/Farsi (🇮🇷) - فارسی - Iran, Afghanistan'
          - '9 - Turkish (🇹🇷) - Türkçe - Turkey, Cyprus'
          - '10 - Japanese (🇯🇵) - 日本語 - Japan'
          - '11 - Korean (🇰🇷) - 한국어 - South Korea'
          - '12 - Russian (🇷🇺) - Русский - Russia, CIS'
          - '13 - Italian (🇮🇹) - Italiano - Italy'
          - '14 - Dutch (🇳🇱) - Nederlands - Netherlands, Belgium'
          - '15 - Polish (🇵🇱) - Polski - Poland'
          - '16 - Ukrainian (🇺🇦) - Українська - Ukraine'
          - '17 - Hindi (🇮🇳) - हिन्दी - India'
          - '18 - Urdu (🇵🇰) - اردو - Pakistan'
          - '19 - Indonesian (🇮🇩) - Bahasa Indonesia - Indonesia'
          - '20 - Vietnamese (🇻🇳) - Tiếng Việt - Vietnam'
          - '21 - Thai (🇹🇭) - ไทย - Thailand'
          - '22 - Greek (🇬🇷) - Ελληνικά - Greece'
          - '23 - Hebrew (🇮🇱) - עברית - Israel'
          - '24 - Swedish (🇸🇪) - Svenska - Scandinavia'
          - '25 - Norwegian (🇳🇴) - Norsk - Scandinavia'
          - '26 - Danish (🇩🇰) - Dansk - Scandinavia'
          - '27 - Finnish (🇫🇮) - Suomi - Scandinavia'
          - '28 - Czech (🇨🇿) - Čeština - Czech Republic'
          - '29 - Hungarian (🇭🇺) - Magyar - Hungary'
          - '30 - Romanian (🇷🇴) - Română - Romania'
          - '31 - Bulgarian (🇧🇬) - Български - Bulgaria'
          - '32 - Croatian (🇭🇷) - Hrvatski - Croatia'
          - '33 - Serbian (🇷🇸) - Српски - Serbia'
          - '34 - Slovenian (🇸🇮) - Slovenščina - Slovenia'
          - '35 - Slovak (🇸🇰) - Slovenčina - Slovakia'
          - '36 - Lithuanian (🇱🇹) - Lietuvių - Lithuania'
          - '37 - Latvian (🇱🇻) - Latviešu - Latvia'
          - '38 - Estonian (🇪🇪) - Eesti - Estonia'
          - '39 - Malay (🇲🇾) - Bahasa Malaysia - Malaysia'
          - '40 - Filipino (🇵🇭) - Tagalog - Philippines'
          - '41 - Bangla (🇧🇩) - বাংলা - Bangladesh'
          - '42 - Tamil (🇮🇳) - தமிழ் - India, Sri Lanka'
          - '43 - Ukrainian (🇺🇦) - Українська - Ukraine'
          - '44 - Catalan (🇦🇩) - Català - Catalonia'
          - '45 - Welsh (🏴󠁧󠁢󠁷󠁬󠁳󠁿) - Cymraeg - Wales'
          - '46 - Basque (🇪🇸) - Euskara - Basque Country'
          - '47 - Galician (🇪🇸) - Galego - Galicia'
          - '48 - Afrikaans (🇿🇦) - Afrikaans - South Africa'
          - '49 - Amharic (🇪🇹) - አማርኛ - Ethiopia'
          - '50 - Swahili (🇰🇪) - Kiswahili - East Africa'
          - '51 - Yoruba (🇳🇬) - Yoruba - Nigeria'
          - '52 - Zulu (🇿🇦) - isiZulu - South Africa'
          - '53 - All Languages (🌍 Comprehensive - All Academic Papers)'
        default: '1 - English (🇬🇧) - UK, USA, International'
      
      # Year Range - Selectable options
      year_from:
        description: '📅 Year From (Publication Year Start)'
        required: false
        type: choice
        options:
          - 'All Years (No Limit)'
          - '2025 (Current Year)'
          - '2024 (Last Year)'
          - '2023'
          - '2022'
          - '2021'
          - '2020'
          - '2019'
          - '2018'
          - '2017'
          - '2016'
          - '2015 (Last 10 Years)'
          - '2010 (Last 15 Years)'
          - '2005 (Last 20 Years)'
          - '2000 (Last 25 Years)'
          - '1995 (Last 30 Years)'
          - '1990 (Last 35 Years)'
          - '1985 (Last 40 Years)'
          - '1980 (Last 45 Years)'
          - '1975 (Last 50 Years)'
        default: 'All Years (No Limit)'
      
      year_to:
        description: '📅 Year To (Publication Year End)'
        required: false
        type: choice
        options:
          - '2025 (Current Year)'
          - '2024'
          - '2023'
          - '2022'
          - '2021'
          - '2020'
          - '2019'
          - '2018'
          - '2017'
          - '2016'
          - '2015'
          - '2010'
          - '2005'
          - '2000'
          - '1995'
          - '1990'
        default: '2025 (Current Year)'
      
      # Search Mode - Detailed with time and paper estimates
      search_mode:
        description: '⚡ Search Depth & Time (Platforms, Duration, Papers)'
        required: true
        type: choice
        options:
          - 'Sample (🔬 Test Run) - 4 platforms, ~10 min, ~80 papers - Quick test of your topic'
          - 'Quick (⚡ Standard) - 8 platforms, ~30 min, ~1,000 papers - Good for most research'
          - 'Field (📊 Comprehensive) - 28 platforms, ~2 hours, ~3,000 papers - Deep academic search'
          - 'Deep (🌐 Maximum) - 70+ platforms, ~4-8 hours, ~10,000 papers - Maximum coverage'
          - 'Ultra (🚀 Extreme) - 100+ platforms, ~12-24 hours, ~25,000 papers - Exhaustive search'
          - 'Minimal (🐢 Minimal) - 2 platforms, ~5 min, ~40 papers - Fastest option'
          - 'Extended (⏱️ Extended) - 50 platforms, ~6 hours, ~8,000 papers - Extended deep search'
        default: 'Quick (⚡ Standard) - 8 platforms, ~30 min, ~1,000 papers - Good for most research'
      
      # Geographic Areas - Comprehensive list
      geographic_area:
        description: '🌍 Geographic Area / Region (Where research was published)'
        required: false
        type: choice
        options:
          - '🌍 Worldwide (All Countries)'
          - '🌎 Americas'
          - '🌎 North America (USA, Canada, Mexico)'
          - '🇺🇸 United States (USA)'
          - '🇨🇦 Canada'
          - '🇲🇽 Mexico'
          - '🌎 Latin America (Central & South America)'
          - '🇧🇷 Brazil'
          - '🇦🇷 Argentina'
          - '🇨🇱 Chile'
          - '🇨🇴 Colombia'
          - '🇵🇪 Peru'
          - '🇻🇪 Venezuela'
          - '🇪🇨 Ecuador'
          - '🌍 Europe'
          - '🇬🇧 United Kingdom (UK)'
          - '🇩🇪 Germany'
          - '🇫🇷 France'
          - '🇮🇹 Italy'
          - '🇪🇸 Spain'
          - '🇵🇹 Portugal'
          - '🇳🇱 Netherlands'
          - '🇧🇪 Belgium'
          - '🇨🇭 Switzerland'
          - '🇦🇹 Austria'
          - '🇵🇱 Poland'
          - '🇨🇿 Czech Republic'
          - '🇭🇺 Hungary'
          - '🇷🇴 Romania'
          - '🇸🇪 Sweden'
          - '🇳🇴 Norway'
          - '🇩🇰 Denmark'
          - '🇫🇮 Finland'
          - '🇬🇷 Greece'
          - '🇹🇷 Turkey'
          - '🇷🇺 Russia'
          - '🇺🇦 Ukraine'
          - '🌍 Middle East & North Africa (MENA)'
          - '🇸🇦 Saudi Arabia'
          - '🇦🇪 United Arab Emirates (UAE)'
          - '🇶🇦 Qatar'
          - '🇰🇼 Kuwait'
          - '🇧🇭 Bahrain'
          - '🇴🇲 Oman'
          - '🇯🇴 Jordan'
          - '🇱🇧 Lebanon'
          - '🇸🇾 Syria'
          - '🇮🇶 Iraq'
          - '🇮🇷 Iran'
          - '🇪🇬 Egypt'
          - '🇲🇦 Morocco'
          - '🇹🇳 Tunisia'
          - '🇩🇿 Algeria'
          - '🇱🇾 Libya'
          - '🇸🇩 Sudan'
          - '🌍 Africa'
          - '🇿🇦 South Africa'
          - '🇳🇬 Nigeria'
          - '🇰🇪 Kenya'
          - '🇪🇹 Ethiopia'
          - '🇬🇭 Ghana'
          - '🇸🇳 Senegal'
          - '🇹🇿 Tanzania'
          - '🇺🇬 Uganda'
          - '🇨🇲 Cameroon'
          - '🌏 Asia Pacific'
          - '🇨🇳 China'
          - '🇯🇵 Japan'
          - '🇰🇷 South Korea'
          - '🇮🇳 India'
          - '🇸🇬 Singapore'
          - '🇭🇰 Hong Kong'
          - '🇹🇼 Taiwan'
          - '🇦🇺 Australia'
          - '🇳🇿 New Zealand'
          - '🇵🇭 Philippines'
          - '🇲🇾 Malaysia'
          - '🇮🇩 Indonesia'
          - '🇹🇭 Thailand'
          - '🇻🇳 Vietnam'
          - '🇵🇰 Pakistan'
          - '🇧🇩 Bangladesh'
          - '🇱🇰 Sri Lanka'
          - '🇳🇵 Nepal'
          - '🇧🇹 Bhutan'
          - '🌏 Central Asia'
          - '🇰🇿 Kazakhstan'
          - '🇺🇿 Uzbekistan'
          - '🇹🇲 Turkmenistan'
          - '🇰🇬 Kyrgyzstan'
          - '🇹🇯 Tajikistan'
        default: '🌍 Worldwide (All Countries)'
      
      # Max Batches
      max_batches:
        description: '📦 Paper Limit (0=All, 12=600 papers in ~6hrs)'
        required: false
        type: string
        default: '12'
      
      # Enable Sci-Hub
      enable_scihub:
        description: '🔓 Enable Shadow Libraries (Sci-Hub for paid papers)?'
        required: false
        type: boolean
        default: true
      
      # Output Folder Mode
      output_mode:
        description: '📁 Output Folder Structure'
        required: false
        type: choice
        options:
          - 'Hierarchical (16 folders - by Year/Topic/Author)'
          - 'Single Folder (All files in one directory)'
          - 'Flat (Simple list - no subfolders)'
        default: 'Hierarchical (16 folders - by Year/Topic/Author)'
      
      # Custom Keywords
      custom_keywords:
        description: '🔑 Custom Focus Keywords (comma-separated, optional)'
        required: false
        type: string
        default: ''
      
      # Proxy
      proxy:
        description: '🌐 Proxy / VPN Settings'
        required: false
        type: choice
        options:
          - 'y - Auto (Built-in proxy for restricted sites)'
          - 'p - Custom URL (Provide your own proxy)'
          - 'n - Skip (Direct connection, no proxy)'
        default: 'y - Auto (Built-in proxy for restricted sites)'

jobs:
  research-search:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Display Configuration
        run: |
          echo "========================================="
          echo "   🔬 Research Hunter - Search Config"
          echo "========================================="
          echo ""
          echo "📚 RESEARCH TOPIC:"
          echo "   ${{ github.event.inputs.research_topic }}"
          echo ""
          echo "❓ RESEARCH QUESTIONS:"
          [[ -n "${{ github.event.inputs.research_question_1 }}" ]] && echo "   1. ${{ github.event.inputs.research_question_1 }}"
          [[ -n "${{ github.event.inputs.research_question_2 }}" ]] && echo "   2. ${{ github.event.inputs.research_question_2 }}"
          [[ -n "${{ github.event.inputs.research_question_3 }}" ]] && echo "   3. ${{ github.event.inputs.research_question_3 }}"
          [[ -n "${{ github.event.inputs.research_question_4 }}" ]] && echo "   4. ${{ github.event.inputs.research_question_4 }}"
          [[ -n "${{ github.event.inputs.research_question_5 }}" ]] && echo "   5. ${{ github.event.inputs.research_question_5 }}"
          echo ""
          echo "🎓 ACADEMIC FIELD:"
          echo "   ${{ github.event.inputs.academic_field }}"
          echo ""
          echo "📄 STUDY TYPE:"
          echo "   ${{ github.event.inputs.study_type }}"
          echo ""
          echo "🌐 SEARCH LANGUAGE:"
          echo "   ${{ github.event.inputs.language }}"
          echo ""
          echo "🌍 GEOGRAPHIC AREA:"
          echo "   ${{ github.event.inputs.geographic_area }}"
          echo ""
          echo "📅 YEAR RANGE:"
          echo "   From: ${{ github.event.inputs.year_from }}"
          echo "   To:   ${{ github.event.inputs.year_to }}"
          echo ""
          echo "⚡ SEARCH MODE:"
          echo "   ${{ github.event.inputs.search_mode }}"
          echo ""
          echo "📦 MAX BATCHES: ${{ github.event.inputs.max_batches }}"
          echo "   (Each batch = 50 papers)"
          echo "   0 = Unlimited, 12 = 600 papers in ~6 hours"
          echo ""
          echo "🔓 SCI-HUB/SHADOW LIBRARIES: ${{ github.event.inputs.enable_scihub }}"
          echo "📁 OUTPUT MODE: ${{ github.event.inputs.output_mode }}"
          echo "🔑 CUSTOM KEYWORDS: ${{ github.event.inputs.custom_keywords }}"
          echo "🌐 PROXY: ${{ github.event.inputs.proxy }}"
          echo ""
          echo "========================================="
      
      - name: Execute Search
        env:
          RESEARCH_TOPIC: ${{ github.event.inputs.research_topic }}
          RESEARCH_QUESTION_1: ${{ github.event.inputs.research_question_1 }}
          RESEARCH_QUESTION_2: ${{ github.event.inputs.research_question_2 }}
          RESEARCH_QUESTION_3: ${{ github.event.inputs.research_question_3 }}
          RESEARCH_QUESTION_4: ${{ github.event.inputs.research_question_4 }}
          RESEARCH_QUESTION_5: ${{ github.event.inputs.research_question_5 }}
          ACADEMIC_FIELD: ${{ github.event.inputs.academic_field }}
          STUDY_TYPE: ${{ github.event.inputs.study_type }}
          LANGUAGE: ${{ github.event.inputs.language }}
          YEAR_FROM: ${{ github.event.inputs.year_from }}
          YEAR_TO: ${{ github.event.inputs.year_to }}
          SEARCH_MODE: ${{ github.event.inputs.search_mode }}
          GEOGRAPHIC_AREA: ${{ github.event.inputs.geographic_area }}
          MAX_BATCHES: ${{ github.event.inputs.max_batches }}
          ENABLE_SCIHUB: ${{ github.event.inputs.enable_scihub }}
          OUTPUT_MODE: ${{ github.event.inputs.output_mode }}
          CUSTOM_KEYWORDS: ${{ github.event.inputs.custom_keywords }}
          PROXY: ${{ github.event.inputs.proxy }}
        run: |
          echo "🚀 Starting search execution..."
          echo ""
          echo "Configuration parsed:"
          echo "  - Topic: $RESEARCH_TOPIC"
          echo "  - Languages: $LANGUAGE"
          echo "  - Geography: $GEOGRAPHIC_AREA"
          echo "  - Year range: $YEAR_FROM to $YEAR_TO"
          echo "  - Search mode: $SEARCH_MODE"
          echo ""
          echo "⏳ This may take several minutes to hours depending on search mode..."
          # Run the actual search
          python run.py search "$RESEARCH_TOPIC" \
            --year-from "$YEAR_FROM" \
            --year-to "$YEAR_TO" \
            --limit 50 || echo "Search completed (or failed - check logs)"
      
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-results-${{ github.run_number }}
          path: |
            results/**/*.pdf
            results/**/*.json
            search.log
          retention-days: 30
      
      - name: Summary
        if: always()
        run: |
          echo ""
          echo "========================================="
          echo "   ✅ Search Execution Complete"
          echo "========================================="
          echo ""
          echo "🔢 Workflow Run: #${{ github.run_number }}"
          echo "📅 Date: $(date)"
          echo "🔗 Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "📁 Results saved as artifact"
          echo "   Artifact name: research-results-${{ github.run_number }}"
          echo "   Retention: 30 days"
          echo ""
          echo "Download your results from the Actions tab."