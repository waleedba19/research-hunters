jobs:
  research-search:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Display Configuration
        run: |
          echo "========================================="
          echo "   🔬 Research Hunter v7 — Search Config"
          echo "========================================="
          echo ""
          echo "📚 RESEARCH TOPIC:"
          echo "   ${{ github.event.inputs.research_topic }}"
          echo ""
          echo "❓ RESEARCH QUESTIONS:"
          [[ -n "${{ github.event.inputs.research_question_1 }}" ]] && echo "   1. ${{ github.event.inputs.research_question_1 }}"
          [[ -n "${{ github.event.inputs.research_question_2 }}" ]] && echo "   2. ${{ github.event.inputs.research_question_2 }}"
          [[ -n "${{ github.event.inputs.research_question_3 }}" ]] && echo "   3. ${{ github.event.inputs.research_question_3 }}"
          [[ -n "${{ github.event.inputs.research_question_4 }}" ]] && echo "   4. ${{ github.event.inputs.research_question_4 }}"
          [[ -n "${{ github.event.inputs.research_question_5 }}" ]] && echo "   5. ${{ github.event.inputs.research_question_5 }}"
          echo ""
          echo "🎓 ACADEMIC FIELD:"
          echo "   ${{ github.event.inputs.academic_field }}"
          echo ""
          echo "📄 PUBLICATION TYPE:"
          echo "   ${{ github.event.inputs.publication_type }}"
          echo ""
          echo "🎓 STUDY LEVEL:"
          echo "   ${{ github.event.inputs.study_level }}"
          echo ""
          echo "🔬 RESEARCH METHODOLOGY:"
          echo "   ${{ github.event.inputs.research_methodology }}"
          echo ""
          echo "📑 DISSERTATION PART:"
          echo "   ${{ github.event.inputs.dissertation_part }}"
          echo ""
          echo "🌐 SEARCH LANGUAGE:"
          echo "   ${{ github.event.inputs.search_language }}"
          echo ""
          echo "📊 QUARTILE FILTER:"
          echo "   ${{ github.event.inputs.quartile_filter }}"
          echo ""
          echo "📦 PAPER LIMIT:"
          echo "   ${{ github.event.inputs.paper_limit }}"
          echo ""
          echo "⚡ SEARCH MODE:"
          echo "   ${{ github.event.inputs.search_mode }}"
          echo ""
          echo "🌍 GEOGRAPHIC AREA:"
          echo "   ${{ github.event.inputs.geographic_area }}"
          echo ""
          echo "📅 YEAR RANGE:"
          echo "   From: ${{ github.event.inputs.year_from }}"
          echo "   To:   ${{ github.event.inputs.year_to }}"
          echo ""
          echo "🔓 SCI-HUB/SHADOW LIBRARIES: ${{ github.event.inputs.enable_scihub }}"
          echo "🔑 CUSTOM KEYWORDS: ${{ github.event.inputs.custom_keywords }}"
          echo ""
          echo "========================================="

      - name: Execute Search
        env:
          RESEARCH_TOPIC: ${{ github.event.inputs.research_topic }}
          RQ1: ${{ github.event.inputs.research_question_1 }}
          RQ2: ${{ github.event.inputs.research_question_2 }}
          RQ3: ${{ github.event.inputs.research_question_3 }}
          RQ4: ${{ github.event.inputs.research_question_4 }}
          RQ5: ${{ github.event.inputs.research_question_5 }}
          ACADEMIC_FIELD: ${{ github.event.inputs.academic_field }}
          PUBLICATION_TYPE: ${{ github.event.inputs.publication_type }}
          STUDY_LEVEL: ${{ github.event.inputs.study_level }}
          RESEARCH_METHODOLOGY: ${{ github.event.inputs.research_methodology }}
          DISSERTATION_PART: ${{ github.event.inputs.dissertation_part }}
          SEARCH_LANGUAGE: ${{ github.event.inputs.search_language }}
          QUARTILE_FILTER: ${{ github.event.inputs.quartile_filter }}
          PAPER_LIMIT: ${{ github.event.inputs.paper_limit }}
          SEARCH_MODE: ${{ github.event.inputs.search_mode }}
          GEOGRAPHIC_AREA: ${{ github.event.inputs.geographic_area }}
          YEAR_FROM: ${{ github.event.inputs.year_from }}
          YEAR_TO: ${{ github.event.inputs.year_to }}
          CUSTOM_KEYWORDS: ${{ github.event.inputs.custom_keywords }}
          ENABLE_SCIHUB: ${{ github.event.inputs.enable_scihub }}
          ENABLE_LEARNING: ${{ github.event.inputs.enable_learning }}
          GENERATE_PAPER: ${{ github.event.inputs.generate_paper }}
          PAPER_TYPE: ${{ github.event.inputs.paper_type }}
          OUTPUT_FORMAT: ${{ github.event.inputs.output_format }}
        run: |
          echo "🚀 Starting Research Hunter v7 — Ultra Comprehensive Search..."
          echo ""
          echo "Configuration:"
          echo "  - Topic: $RESEARCH_TOPIC"
          echo "  - Field: $ACADEMIC_FIELD"
          echo "  - Publication Type: $PUBLICATION_TYPE"
          echo "  - Study Level: $STUDY_LEVEL"
          echo "  - Methodology: $RESEARCH_METHODOLOGY"
          echo "  - Language: $SEARCH_LANGUAGE"
          echo "  - Quartile: $QUARTILE_FILTER"
          echo "  - Paper Limit: $PAPER_LIMIT"
          echo "  - Search Mode: $SEARCH_MODE"
          echo ""
          echo "⏳ This may take several minutes to hours depending on search mode..."
          
          # Build command arguments - use printf for safe quoting of special characters
          CMD="python research_hunter_v2-4.py"
          # Use printf %q to safely quote the title (handles special chars: : ' " etc.)
          SAFE_TITLE=$(printf '%s' "$RESEARCH_TOPIC" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))' 2>/dev/null || echo "\"$RESEARCH_TOPIC\"")
          CMD="$CMD --title $SAFE_TITLE"
          
          # Add research questions if provided
          if [[ -n "$RQ1" ]]; then
            SAFE_RQ1=$(printf '%s' "$RQ1" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))' 2>/dev/null || echo "\"$RQ1\"")
            CMD="$CMD --rq1 $SAFE_RQ1"
          fi
          if [[ -n "$RQ2" ]]; then
            SAFE_RQ2=$(printf '%s' "$RQ2" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))' 2>/dev/null || echo "\"$RQ2\"")
            CMD="$CMD --rq2 $SAFE_RQ2"
          fi
          if [[ -n "$RQ3" ]]; then
            SAFE_RQ3=$(printf '%s' "$RQ3" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))' 2>/dev/null || echo "\"$RQ3\"")
            CMD="$CMD --rq3 $SAFE_RQ3"
          fi
          if [[ -n "$RQ4" ]]; then
            SAFE_RQ4=$(printf '%s' "$RQ4" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))' 2>/dev/null || echo "\"$RQ4\"")
            CMD="$CMD --rq4 $SAFE_RQ4"
          fi
          if [[ -n "$RQ5" ]]; then
            SAFE_RQ5=$(printf '%s' "$RQ5" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))' 2>/dev/null || echo "\"$RQ5\"")
            CMD="$CMD --rq5 $SAFE_RQ5"
          fi
          
          # Add field (extract number from "1. Field Name" format)
          FIELD_NUM=$(echo "$ACADEMIC_FIELD" | cut -d. -f1)
          if [[ "$FIELD_NUM" != "0" ]]; then
            CMD="$CMD --field $FIELD_NUM"
          fi
          
          # Add publication type (extract number)
          PUB_NUM=$(echo "$PUBLICATION_TYPE" | cut -d. -f1)
          if [[ "$PUB_NUM" != "49" ]]; then
            CMD="$CMD --publication-type $PUB_NUM"
          fi
          
          # Add study level (extract number)
          LVL_NUM=$(echo "$STUDY_LEVEL" | cut -d. -f1)
          if [[ "$LVL_NUM" != "12" ]]; then
            CMD="$CMD --study-level $LVL_NUM"
          fi
          
          # Add methodology (extract number)
          METH_NUM=$(echo "$RESEARCH_METHODOLOGY" | cut -d. -f1)
          if [[ "$METH_NUM" != "51" ]]; then
            CMD="$CMD --methodology $METH_NUM"
          fi
          
          # Add dissertation part (extract number)
          PART_NUM=$(echo "$DISSERTATION_PART" | cut -d. -f1)
          if [[ "$PART_NUM" != "28" ]]; then
            CMD="$CMD --dissertation-part $PART_NUM"
          fi
          
          # Add language (extract number)
          LANG_NUM=$(echo "$SEARCH_LANGUAGE" | cut -d. -f1)
          CMD="$CMD --language $LANG_NUM"
          
          # Add search mode (7 modes + custom)
          MODE=""
          case "$SEARCH_MODE" in
            "Sample"*) MODE="sample" ;;
            "Quick"*) MODE="quick" ;;
            "Field"*) MODE="field" ;;
            "Extended"*) MODE="extended" ;;
            "Deep"*) MODE="deep" ;;
            "Ultra"*) MODE="ultra" ;;
            "Maximum"*) MODE="maximum" ;;
            "Custom"*) MODE="custom" ;;
            *) MODE="deep" ;;
          esac
          CMD="$CMD --mode $MODE"
          
          # Add year range
          YEAR_FROM_NUM=$(echo "$YEAR_FROM" | grep -oE '[0-9]{4}' | head -1)
          if [[ -n "$YEAR_FROM_NUM" ]]; then
            CMD="$CMD --year-from $YEAR_FROM_NUM"
          fi
          YEAR_TO_NUM=$(echo "$YEAR_TO" | grep -oE '[0-9]{4}' | head -1)
          if [[ -n "$YEAR_TO_NUM" ]]; then
            CMD="$CMD --year-to $YEAR_TO_NUM"
          fi
          
          # Add paper limit based on selection (maps to max-papers parameter)
          # Paper limits are exact counts based on platform coverage:
          # - 1: Light 50 papers
          # - 2: Standard 150 papers
          # - 3: Medium 300 papers
          # - 4: Extended 500 papers (RECOMMENDED)
          # - 5: Deep 800 papers
          # - 6: Maximum 1,200 papers
          # - 7: Ultra 2,000 papers
          # - 8: Mega 5,000 papers
          # - 9: Giga 10,000 papers
          # - 10: Tera 20,000 papers
          # - 11: Infinite 40,000+ papers
          # - 12: Unlimited 100,000+ papers
          PAPER_NUM=$(echo "$PAPER_LIMIT" | cut -d. -f1)
          case "$PAPER_NUM" in
            1) MAX_PAPERS=50 ;;
            2) MAX_PAPERS=150 ;;
            3) MAX_PAPERS=300 ;;
            4) MAX_PAPERS=500 ;;
            5) MAX_PAPERS=800 ;;
            6) MAX_PAPERS=1200 ;;
            7) MAX_PAPERS=2000 ;;
            8) MAX_PAPERS=5000 ;;
            9) MAX_PAPERS=10000 ;;
            10) MAX_PAPERS=20000 ;;
            11) MAX_PAPERS=40000 ;;
            12) MAX_PAPERS=0 ;;  # 0 = unlimited
          esac
          CMD="$CMD --max-papers $MAX_PAPERS"

          # Add quartile filter (always pass it)
          QUARTILE_NUM=$(echo "$QUARTILE_FILTER" | cut -d. -f1)
          CMD="$CMD --quartile-filter $QUARTILE_NUM"
          
          # Add custom keywords (with safe quoting)
          if [[ -n "$CUSTOM_KEYWORDS" ]]; then
            SAFE_KEYWORDS=$(printf '%s' "$CUSTOM_KEYWORDS" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))' 2>/dev/null || echo "\"$CUSTOM_KEYWORDS\"")
            CMD="$CMD --keywords $SAFE_KEYWORDS"
          fi
          
          # Add scihub if enabled
          [[ "$ENABLE_SCIHUB" == "true" ]] && CMD="$CMD --scihub"
          
          # Add learning system if enabled
          [[ "$ENABLE_LEARNING" == "true" ]] && CMD="$CMD --learn"
          
          # Add paper generation if enabled
          [[ "$GENERATE_PAPER" == "true" ]] && CMD="$CMD --generate-paper"
          
          # Add paper type
          if [[ -n "$PAPER_TYPE" ]]; then
            CMD="$CMD --paper-type $PAPER_TYPE"
          fi
          
          # Add output format
          if [[ -n "$OUTPUT_FORMAT" ]]; then
            CMD="$CMD --output-format $OUTPUT_FORMAT"
          fi
          
          echo "Executing: $CMD"
          echo ""
          eval $CMD || echo "Search completed (check logs for details)"

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-results-${{ github.run_number }}
          path: |
            pdf_files/**/*.pdf
            results/**/*.json
            *.json
            *.md
            *.docx
            search.log
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo ""
          echo "========================================="
          echo "   ✅ Research Hunter v7 — Search Complete"
          echo "========================================="
          echo ""
          echo "🔢 Workflow Run: #${{ github.run_number }}"
          echo "📅 Date: $(date)"
          echo "🔗 Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "📁 Results saved as artifact"
          echo "   Artifact name: research-results-${{ github.run_number }}"
          echo "   Retention: 30 days"
          echo ""
          echo "Download your results from the Actions tab."
