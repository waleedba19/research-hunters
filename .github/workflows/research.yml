jobs:
  verify:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      GOOGLE_OAUTH_REFRESH: ${{ secrets.GOOGLE_OAUTH_REFRESH }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache Ollama models (shared between jobs)
        id: cache-ollama
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-qwen2.5vl-3b
      - name: Setup Ollama
        run: |
          set -e
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -s http://127.0.0.1:11434/api/tags > /dev/null 2>&1; then break; fi
            sleep 1
          done
          if [ "${{ steps.cache-ollama.outputs.cache-hit }}" != "true" ]; then
            ollama pull qwen2.5vl:3b
          else
            echo "Model restored from cache"
          fi
      - name: Test model inference
        run: |
          ollama run qwen2.5vl:3b "hello" 2>&1 | head -5
          echo "Ollama READY"
      - name: Restore proof memory (cross-run learning persistence)
        uses: actions/cache@v4
        with:
          path: scripts/proof_memory.db
          key: proof-memory-${{ github.run_id }}
          restore-keys: proof-memory-
      - name: Install Python dependencies
        run: pip install -q requests rich openpyxl python-docx python-pptx pdfplumber pymupdf pytesseract reportlab playwright pillow ollama
      - name: Run full stack verification
        run: python scripts/verify.py --model qwen2.5vl:3b --ci || echo "Verify had some failures (non-critical)"

  daily_learn:
    needs: [verify, research]
    if: always() && github.event_name == 'workflow_dispatch' && contains(fromJson('["learn-only","full-research"]'), github.event.inputs.operation_mode)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      GOOGLE_OAUTH_REFRESH: ${{ secrets.GOOGLE_OAUTH_REFRESH }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache Ollama models (shared between jobs)
        id: cache-ollama
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-qwen2.5vl-3b
      - name: Setup Ollama
        run: |
          set -e
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -s http://127.0.0.1:11434/api/tags > /dev/null 2>&1; then break; fi
            sleep 1
          done
          if [ "${{ steps.cache-ollama.outputs.cache-hit }}" != "true" ]; then
            ollama pull qwen2.5vl:3b
          else
            echo "Model restored from cache"
          fi
      - name: Test model inference
        run: |
          ollama run qwen2.5vl:3b "hello" 2>&1 | head -5
          echo "Ollama READY"
      - name: Restore learning brain (cross-run persistence)
        uses: actions/cache@v4
        with:
          path: scripts/proof_memory.db
          key: proof-memory-${{ github.run_id }}
          restore-keys: proof-memory-
      - name: Restore deep reading knowledge (cross-run persistence)
        uses: actions/cache@v4
        with:
          path: scripts/deep_knowledge.db
          key: deep-knowledge-${{ github.run_id }}
          restore-keys: deep-knowledge-
      - name: Install dependencies
        run: |
          pip install -q requests rich ollama pdfplumber pymupdf
      - name: Show current brain stats
        run: |
          python scripts/daily_learner.py --model qwen2.5vl:3b --stats || echo "No brain data yet"
      - name: Run daily autonomous learning (1 hour deep search + read)
        run: |
          echo " Starting daily learning cycle..."
          echo " Date: $(date -u)"
          echo " Topics: ~5 academic fields (rotating daily)"
          echo " Brain: proof_memory.db (accumulates across runs)"
          echo ""
          python scripts/daily_learner.py --model qwen2.5vl:3b --new-only --topics 5
      - name: Show updated brain stats
        run: |
          python scripts/daily_learner.py --model qwen2.5vl:3b --stats
      - name: Generate brain report artifact
        run: |
          python scripts/daily_learner.py --model qwen2.5vl:3b --report --report-path brain_report.md
      - name: Upload brain report
        uses: actions/upload-artifact@v4
        with:
          name: brain-report-daily
          path: brain_report.md
          retention-days: 90

      - name: Deep PDF reading (learn from papers page-by-page)
        run: |
          echo " Starting deep PDF reading..."
          echo " Reading up to 3 papers page-by-page..."
          echo ""
          python scripts/deep_reader.py --model qwen2.5vl:3b --max-papers 3
      - name: Generate deep reading report
        run: |
          python scripts/deep_reader.py --model qwen2.5vl:3b --report --report-path deep_report.md
      - name: Send daily Telegram notification
        run: |
          python scripts/deep_reader.py --model qwen2.5vl:3b --notify --max-papers 3 || echo "Notification skipped"
      - name: Upload deep reading report
        uses: actions/upload-artifact@v4
        with:
          name: deep-reading-report-daily
          path: deep_report.md
          retention-days: 90

  research:
    needs: [verify]
    if: github.event_name == 'workflow_dispatch' && contains(fromJson('["research-only","full-research","generate-only"]'), github.event.inputs.operation_mode)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      GOOGLE_OAUTH_REFRESH: ${{ secrets.GOOGLE_OAUTH_REFRESH }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Cache Ollama models (shared between jobs)
        id: cache-ollama
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-qwen2.5vl-3b
      - name: Setup Ollama
        run: |
          set -e
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -s http://127.0.0.1:11434/api/tags > /dev/null 2>&1; then break; fi
            sleep 1
          done
          if [ "${{ steps.cache-ollama.outputs.cache-hit }}" != "true" ]; then
            ollama pull qwen2.5vl:3b
          else
            echo "Model restored from cache"
          fi
      - name: Test model inference
        run: |
          ollama run qwen2.5vl:3b "hello" 2>&1 | head -5
          echo "Ollama READY"
      - name: Install dependencies
        run: |
          pip install -q requests rich openpyxl python-docx python-pptx pdfplumber pymupdf playwright pillow pytesseract reportlab ollama
          python -m playwright install chromium 2>&1 | tail -5
      - name: Determine output folder (deterministic name from title)
        id: folder
        shell: bash
        run: |
          TITLE="${{ github.event.inputs.title }}"
          SAFE=$(echo "$TITLE" | sed 's/[^a-zA-Z0-9_\-]/_/g' | sed 's/__*/_/g' | cut -c1-50)
          echo "folder_name=RESEARCH_${SAFE}" >> $GITHUB_OUTPUT
          echo "Using folder: RESEARCH_${SAFE}"
      - name: Calculate chunk plan
        id: chunk
        shell: bash
        run: |
          FOLDER="pdf_files/${{ steps.folder.outputs.folder_name }}"
          mkdir -p "$FOLDER"
          STATE_FILE="$FOLDER/chunk_state.json"
          DEPTH="${{ github.event.inputs.research_depth }}"
          DEPTH=$(echo "$DEPTH" | cut -d' ' -f1)
          if [ -f "$STATE_FILE" ]; then
            CHUNK=$(python3 -c "import json; d=json.load(open('$STATE_FILE')); print(d.get('chunk', 1))")
            CHUNK=$((CHUNK + 1))
          else
            CHUNK=1
          fi
          case "$DEPTH" in
            light) ESTIMATED=2 ;;
            medium) ESTIMATED=4 ;;
            deep) ESTIMATED=8 ;;
            *) ESTIMATED=4 ;;
          esac
          echo "{\"chunk\": $CHUNK, \"estimated\": $ESTIMATED, \"depth\": \"$DEPTH\"}" > "$STATE_FILE"
          echo "current_chunk=$CHUNK" >> $GITHUB_OUTPUT
          echo "total_chunks=$ESTIMATED" >> $GITHUB_OUTPUT
          echo "depth=$DEPTH" >> $GITHUB_OUTPUT
          echo "============================================"
          echo "  RESEARCH PLAN"
          echo "  Chunk $CHUNK of ~$ESTIMATED"
          echo "  Depth: $DEPTH"
          echo "  Each chunk runs up to 3 hours"
          echo "============================================"
      - name: Download previous research data (cumulative)
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: research-data-${{ steps.folder.outputs.folder_name }}
          path: pdf_files_restore
      - name: Download previous cache (resume support)
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: cache-data
          path: download_cache
      - name: Restore cumulative data and cache
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p pdf_files
          echo "Restoring previous data and cache..."
          if [ -d "pdf_files_restore" ]; then
            echo "Found previous research data"
            cp -r pdf_files_restore/. pdf_files/
            rm -rf pdf_files_restore
          else
            echo "No previous research data found - starting fresh"
          fi
          if [ -d "download_cache" ]; then
            cp -f download_cache/*.json . 2>/dev/null || true
            if [ -d "download_cache/pdf_files" ]; then
              cp -rn download_cache/pdf_files/. pdf_files/ 2>/dev/null || true
            fi
            rm -rf download_cache
          fi
          echo "All data restored"
          ls -la pdf_files/ 2>/dev/null | head -20
      - name: Run Research Hunter (cumulative mode)
        env:
          CI_MODE: "true"
          CI_OPERATION_MODE: "${{ github.event.inputs.operation_mode }}"
          CI_TITLE: "${{ github.event.inputs.title }}"
          CI_RQ1: "${{ github.event.inputs.rq1 }}"
          CI_RQ2: "${{ github.event.inputs.rq2 }}"
          CI_RQ3: "${{ github.event.inputs.rq3 }}"
          CI_FIELD: "${{ github.event.inputs.field }}"
          CI_STUDY_TYPES: "${{ github.event.inputs.study_type }}"
          CI_STUDY_LEVEL: "${{ github.event.inputs.study_level }}"
          CI_METHODOLOGY: "${{ github.event.inputs.methodology }}"
          CI_THESIS_PART: "${{ github.event.inputs.thesis_part }}"
          CI_QUARTILE: "${{ github.event.inputs.quartile }}"
          CI_MODE_VAL: "${{ github.event.inputs.mode }}"
          CI_RESEARCH_DEPTH: "${{ github.event.inputs.research_depth }}"
          CI_PAPER_LIMIT: "${{ github.event.inputs.paper_limit }}"
          CI_LANGUAGE: "${{ github.event.inputs.language }}"
          CI_SCI_HUB: "${{ github.event.inputs.scihub }}"
          CI_SINGLE_FOLDER: "${{ github.event.inputs.folder_mode }}"
          CI_YEAR_FROM: "${{ github.event.inputs.year_from }}"
          CI_YEAR_TO: "${{ github.event.inputs.year_to }}"
          CI_LEARN: "${{ github.event.inputs.learn }}"
          CI_GENERATE_PAPER: "${{ github.event.inputs.generate_paper }}"
          CI_PAPER_TYPE: "${{ github.event.inputs.paper_type }}"
          CI_OUTPUT_FORMAT: "${{ github.event.inputs.output_format }}"
          CI_GEOGRAPHIC_AREA: "${{ github.event.inputs.geographic_area }}"
          CI_PROXY: "${{ github.event.inputs.proxy }}"
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
          PYTHONIOENCODING: utf-8
        run: |
          echo "========================================================"
          echo "  Research Hunter - CUMULATIVE MODE (CI)"
          echo "  Title: ${{ github.event.inputs.title }}"
          echo "  Mode:  ${{ github.event.inputs.mode }}"
          echo "  Depth: ${{ github.event.inputs.research_depth }}"
          echo "  Operation: ${{ github.event.inputs.operation_mode }}"
          echo "========================================================"
          echo ""
          python research_hunter_v2-4.py; echo "EXIT CODE: $?"

      - name: Check results
        id: check_results
        if: always()
        shell: bash
        run: |
          echo "=== Results Summary ==="
          OUT_DIR="pdf_files/${{ steps.folder.outputs.folder_name }}"
          PDF_COUNT=$(find "$OUT_DIR" -name "*.pdf" 2>/dev/null | wc -l)
          JSON_COUNT=$(find "$OUT_DIR" -name "results.json" 2>/dev/null | wc -l)
          echo "PDFs in cumulative folder: $PDF_COUNT"
          echo "Results JSON: $JSON_COUNT"
          echo "pdf_count=$PDF_COUNT" >> $GITHUB_OUTPUT
          if [ "$PDF_COUNT" -gt 0 ] || [ "$JSON_COUNT" -gt 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=no_results" >> $GITHUB_OUTPUT
          fi

      - name: Zip cumulative results
        id: zip_results
        if: always()
        shell: bash
        run: |
          OUT_DIR="pdf_files/${{ steps.folder.outputs.folder_name }}"
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          SAFE_TITLE=$(echo "${{ github.event.inputs.title }}" | sed 's/[^a-zA-Z0-9_\-]/_/g' | cut -c1-30)
          ZIP_NAME="${SAFE_TITLE}_cumulative.zip"
          echo "Creating cumulative ZIP: $ZIP_NAME"
          if [ -d "$OUT_DIR" ] && [ "$(find "$OUT_DIR" -type f 2>/dev/null | wc -l)" -gt 0 ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq zip unzip
            zip -r -9 "$ZIP_NAME" "$OUT_DIR"
            echo "ZIP created: $ZIP_NAME ($(du -h "$ZIP_NAME" | cut -f1))"
          else
            echo "No data to zip yet"
            touch "$ZIP_NAME"
          fi
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Report chunk progress
        if: always()
        shell: bash
        run: |
          STATE_FILE="pdf_files/${{ steps.folder.outputs.folder_name }}/chunk_state.json"
          CACHE_FILE="pdf_files/${{ steps.folder.outputs.folder_name }}/search_cache.json"
          echo "============================================"
          echo "  CHUNK ${{ steps.chunk.outputs.current_chunk }} OF ~${{ steps.chunk.outputs.total_chunks }}"
          echo "  Depth: ${{ steps.chunk.outputs.depth }}"
          if [ -f "$CACHE_FILE" ]; then
            FOUND=$(python3 -c "import json; d=json.load(open('$CACHE_FILE')); print(len(d.get('papers_found',{})))" 2>/dev/null || echo "?")
            DL=$(python3 -c "import json; d=json.load(open('$CACHE_FILE')); print(len(d.get('papers_downloaded',{})))" 2>/dev/null || echo "?")
            echo "  Papers found: $FOUND  |  Downloaded: $DL"
          fi
          echo "============================================"

      - name: Auto-trigger next run (chain continuation)
        if: always() && steps.check_results.outputs.status == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          TRIGGER_TITLE: ${{ github.event.inputs.title }}
          TRIGGER_RQ1: ${{ github.event.inputs.rq1 }}
          TRIGGER_RQ2: ${{ github.event.inputs.rq2 }}
          TRIGGER_RQ3: ${{ github.event.inputs.rq3 }}
          TRIGGER_FIELD: ${{ github.event.inputs.field }}
          TRIGGER_STUDY_TYPE: ${{ github.event.inputs.study_type }}
          TRIGGER_STUDY_LEVEL: ${{ github.event.inputs.study_level }}
          TRIGGER_METHODOLOGY: ${{ github.event.inputs.methodology }}
          TRIGGER_THESIS_PART: ${{ github.event.inputs.thesis_part }}
          TRIGGER_QUARTILE: ${{ github.event.inputs.quartile }}
          TRIGGER_LANGUAGE: ${{ github.event.inputs.language }}
          TRIGGER_YEAR_FROM: ${{ github.event.inputs.year_from }}
          TRIGGER_YEAR_TO: ${{ github.event.inputs.year_to }}
          TRIGGER_MODE: ${{ github.event.inputs.mode }}
          TRIGGER_PAPER_LIMIT: ${{ github.event.inputs.paper_limit }}
          TRIGGER_FOLDER_MODE: ${{ github.event.inputs.folder_mode }}
          TRIGGER_SCI_HUB: ${{ github.event.inputs.scihub }}
          TRIGGER_PROXY: ${{ github.event.inputs.proxy }}
          TRIGGER_LEARN: ${{ github.event.inputs.learn }}
          TRIGGER_GENERATE_PAPER: ${{ github.event.inputs.generate_paper }}
          TRIGGER_PAPER_TYPE: ${{ github.event.inputs.paper_type }}
          TRIGGER_OUTPUT_FORMAT: ${{ github.event.inputs.output_format }}
          TRIGGER_GEOGRAPHIC_AREA: ${{ github.event.inputs.geographic_area }}
          TRIGGER_RESEARCH_DEPTH: ${{ github.event.inputs.research_depth }}
          TRIGGER_OPERATION_MODE: ${{ github.event.inputs.operation_mode }}
        shell: bash
        run: |
          echo "Checking if more work remains..."
          OUT_DIR="pdf_files/${{ steps.folder.outputs.folder_name }}"
          if [ -f "$OUT_DIR/.search_complete" ]; then
            echo "============================================"
            echo "  SEARCH COMPLETE FLAG FOUND — stopping chain"
            echo "============================================"
            exit 0
          fi
          echo "Chunk ${{ steps.chunk.outputs.current_chunk }} of ~${{ steps.chunk.outputs.total_chunks }} — continuing chain"
          CACHE_FILE="$OUT_DIR/search_cache.json"
          if [ ! -f "$CACHE_FILE" ]; then
            echo "No cache file found - cannot determine remaining work"
            exit 0
          fi
          TOTAL_FOUND=$(python3 -c "import json; d=json.load(open('$CACHE_FILE')); print(len(d.get('papers_found',{})))" 2>/dev/null || echo "0")
          TOTAL_DL=$(python3 -c "import json; d=json.load(open('$CACHE_FILE')); print(len(d.get('papers_downloaded',{})))" 2>/dev/null || echo "0")
          EXHAUSTED=$(python3 -c "import json; d=json.load(open('$CACHE_FILE')); print(str(d.get('queries_exhausted',False)))" 2>/dev/null || echo "False")
          echo "Progress: $TOTAL_DL downloaded / $TOTAL_FOUND found / exhausted=$EXHAUSTED"
          if [ "$EXHAUSTED" = "True" ] && [ "$TOTAL_FOUND" -le "$TOTAL_DL" ]; then
            echo "============================================"
            echo "  ALL RESEARCH COMPLETE!"
            echo "  Chunk ${{ steps.chunk.outputs.current_chunk }} of ~${{ steps.chunk.outputs.total_chunks }}"
            echo "  Total papers found: $TOTAL_FOUND"
            echo "  Total downloaded: $TOTAL_DL"
            echo "============================================"
            exit 0
          fi
          REMAINING=$(( (TOTAL_FOUND - TOTAL_DL + 49) / 50 ))
          echo "Approximately $REMAINING batches remaining"
          if [ "$REMAINING" -le 0 ]; then
            echo "All papers downloaded - no need to trigger another run"
            echo "============================================"
            echo "  ALL RESEARCH COMPLETE!"
            echo "============================================"
            exit 0
          fi
          echo "Triggering next run via GitHub API..."
          python3 -c "import json, os; payload = {'ref': os.environ.get('GITHUB_REF_NAME', 'main'), 'inputs': {}}; [payload['inputs'].update({k.replace('TRIGGER_', '').lower(): v}) for k, v in os.environ.items() if k.startswith('TRIGGER_')]; open('/tmp/payload.json', 'w').write(json.dumps(payload)); print('=== PAYLOAD (all inputs preserved) ==='); print(json.dumps(payload, indent=2)); print('======================================')"
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/research.yml/dispatches" \
            -d @/tmp/payload.json \
            -w "\nHTTP Status: %{http_code}"
          echo ""
          echo "Next run triggered!"
          echo "https://github.com/${{ github.repository }}/actions"

      - name: Upload cumulative research data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-data-${{ steps.folder.outputs.folder_name }}
          path: pdf_files/
          retention-days: 90
          compression-level: 1

      - name: Upload cumulative ZIP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.folder.outputs.folder_name }}_ZIP
          path: ${{ steps.zip_results.outputs.zip_name || '*.zip' }}
          retention-days: 90
          compression-level: 9

      - name: Upload cache/logs (for resume capability)
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: cache-data
          path: |
            pdf_files/*/search_cache.json
            search_cache.json
            ghost_credentials.json
            g4f_locked_config.json
          retention-days: 30
