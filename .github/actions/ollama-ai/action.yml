name: "Ollama AI + OCR Setup"
description: "Installs Ollama with qwen2.5vl model + Tesseract OCR + Playwright + all system deps. One-shot install — no healing loop. Failure = fail fast."
author: "Research Hunter"

inputs:
  model:
    description: "Ollama model with vision (qwen2.5vl:3b)"
    default: "qwen2.5vl:3b"
    required: false
  ollama-version:
    description: "Ollama version to install"
    default: "0.30.4"
    required: false

outputs:
  ollama-status:
    description: "Status of Ollama installation"
    value: ${{ steps.install.outputs.status }}
  model-ready:
    description: "Whether the model is ready"
    value: ${{ steps.test-model.outputs.test-passed }}

runs:
  using: "composite"
  steps:
    - name: Cache Ollama Models
      id: cache-models
      uses: actions/cache@v4
      with:
        path: ~/.ollama
        key: ollama-models-${{ inputs.model }}-${{ runner.os }}
        restore-keys: |
          ollama-models-${{ inputs.model }}-
          ollama-models-

    - name: Install Ollama + Pull Model + Install All Deps
      id: install
      shell: bash
      run: |
        echo "status=Installing..." >> $GITHUB_OUTPUT

        # Ollama
        echo "📥 Installing Ollama..."
        curl -fsSL https://ollama.ai/install.sh | sh > /dev/null 2>&1
        echo "🚀 Starting Ollama server..."
        nohup ollama serve > /tmp/ollama.log 2>&1 &
        for i in $(seq 1 30); do
          if curl -s http://127.0.0.1:11434/api/tags > /dev/null 2>&1; then break; fi
          sleep 1
        done
        echo "✅ Ollama server ready"

        # Model
        echo "📥 Pulling ${{ inputs.model }}..."
        ollama pull ${{ inputs.model }}
        echo "✅ Model pulled"

        # Tesseract + OCR languages
        echo "📥 Installing Tesseract + languages..."
        sudo apt-get update -qq > /dev/null 2>&1
        sudo apt-get install -y tesseract-ocr tesseract-ocr-eng tesseract-ocr-ara tesseract-ocr-fra \
          tesseract-ocr-deu tesseract-ocr-spa tesseract-ocr-chi-sim tesseract-ocr-jpn \
          tesseract-ocr-kor tesseract-ocr-rus tesseract-ocr-por tesseract-ocr-ita \
          tesseract-ocr-tur tesseract-ocr-hin tesseract-ocr-urd tesseract-ocr-fas \
          poppler-utils
        sudo apt-get clean > /dev/null 2>&1
        echo "✅ OCR tools installed"

        # Playwright
        echo "📥 Installing Playwright Chromium..."
        pip install playwright -q > /dev/null 2>&1
        python -m playwright install chromium > /dev/null 2>&1
        echo "✅ Playwright + Chromium ready"

        # Node.js (for DOCX/XLSX generation)
        echo "📥 Checking Node.js..."
        node --version > /dev/null 2>&1 && echo "✅ Node.js $(node --version)" || echo "  Node.js not found (pip fallback will be used)"

        echo "status=ready" >> $GITHUB_OUTPUT

    - name: Start Ollama Server (Clean Restart)
      shell: bash
      run: |
        pkill -f "ollama serve" 2>/dev/null || true
        sleep 2
        nohup ollama serve > /tmp/ollama.log 2>&1 &
        for i in $(seq 1 60); do
          if curl -s http://127.0.0.1:11434/api/tags > /dev/null 2>&1; then break; fi
          sleep 1
        done
        echo "✅ Ollama running"

    - name: One-Shot Model Verification
      id: test-model
      shell: bash
      run: |
        echo "🧪 One-shot verification of ${{ inputs.model }}..."
        ERRORS=0

        # Test 1: Basic inference
        echo -n "  Test 1 (basic): "
        RESULT=$(timeout 120 ollama run ${{ inputs.model }} "What is 2+2? Answer with just the number." 2>/dev/null)
        if echo "$RESULT" | grep -qi "4\|four"; then
          echo "PASS"
        else
          echo "FAIL — got: $RESULT"; ERRORS=$((ERRORS+1))
        fi

        # Test 2: JSON format
        echo -n "  Test 2 (JSON): "
        JSON_RESULT=$(timeout 120 ollama run ${{ inputs.model }} 'Respond with only a JSON object: {"answer": 42}' 2>/dev/null)
        if echo "$JSON_RESULT" | grep -qi "answer.*42"; then
          echo "PASS"
        else
          echo "FAIL — got: $JSON_RESULT"; ERRORS=$((ERRORS+1))
        fi

        if [ $ERRORS -gt 0 ]; then
          echo ""
          echo "❌ Model verification FAILED ($ERRORS errors)"
          echo "=== Ollama Logs (last 20) ==="
          cat /tmp/ollama.log 2>/dev/null | tail -20
          echo "=== Model List ==="
          ollama list 2>/dev/null || true
          echo "test-passed=false" >> $GITHUB_OUTPUT
          exit 1
        fi

        echo ""
        echo "✅ Model fully verified — ready for research pipeline."
        echo "test-passed=true" >> $GITHUB_OUTPUT

branding:
  icon: "cpu"
  color: "purple"
